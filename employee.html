<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Employee Details - Dilshaj Infotech</title>
  <style>
    :root{
      --bg: #f5f7fb;
      --card: #ffffff;
      --primary: #0b72ff;
      --accent: #ff7a59;
      --text: #1f2937;
      --muted: #6b7280;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); padding:24px; display:flex; align-items:center; justify-content:center; min-height:100vh}
    .container{width:100%; max-width:920px}
    .companyname{margin:0 0 18px; text-align:center; color:var(--primary); font-size:1.6rem}
    .welcome{background:linear-gradient(90deg,var(--primary),var(--accent)); color:white; padding:28px; border-radius:12px; margin-bottom:18px; text-align:center}
    .employee-card{background:var(--card); border-radius:12px; box-shadow:0 8px 24px rgba(15,23,42,0.06); overflow:hidden; display:grid; grid-template-columns:240px 1fr; gap:20px; padding:20px; align-items:center}
    .employee-image{width:100%; height:100%; max-height:260px; object-fit:cover; border-radius:8px; background:linear-gradient(135deg,var(--primary),var(--accent)); display:block}
    .employee-details{padding:8px 0}
    .row{display:flex; gap:12px; align-items:center; margin:8px 0}
    .label{font-weight:600; color:var(--muted); width:120px}
    .value{color:var(--text)}
    .muted-note{color:var(--muted); font-size:0.9rem}
    a.emp-link{color:var(--primary); text-decoration:none}
    a.emp-link:hover{text-decoration:underline}
    .back-link{display:inline-block;margin-bottom:12px;color:var(--primary);cursor:pointer}
    .search-bar{display:flex;gap:8px;justify-content:center;margin:18px 0}
    .search-bar input{padding:10px 12px;border-radius:8px;border:1px solid #d1d5db;min-width:220px}
    .search-bar button{padding:10px 14px;border-radius:8px;border:none;background:var(--primary);color:white;cursor:pointer}
    .suggestions{max-width:520px;margin:0 auto;background:white;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 6px 18px rgba(2,6,23,0.06);overflow:hidden}
    .suggestion-item{padding:10px 12px;border-bottom:1px solid #f3f4f6;cursor:pointer}
    .suggestion-item:last-child{border-bottom:none}
    .suggestion-item:hover{background:#f8fafc}
    @media (max-width:680px){
      .employee-card{grid-template-columns:1fr; text-align:center}
      .label{width:auto; display:block}
      .row{justify-content:center}
      .employee-image{max-height:360px}
    }
  </style>
</head>
<body>
  <div class="container"></div>

  <script>
  (function(){
    let employeesData = [];

    function getIdFromURL(){
      const params = new URLSearchParams(location.search);
      if(params.get('id')) return params.get('id');
      if(location.hash) return location.hash.replace('#','');
      const parts = location.pathname.split('/').filter(Boolean);
      const last = parts[parts.length-1] || '';
      if(/^\d+$/.test(last)) return last;
      return null;
    }

    function renderWelcome(){
      const container = document.querySelector('.container');
      container.innerHTML = '';
      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      welcome.innerHTML = '<h1>Welcome to Dilshaj Infotech</h1><p>Browse employees below or open this page with <code>?id=&lt;EMP_ID&gt;</code></p>';
      container.appendChild(welcome);

      // Search bar
      const searchWrap = document.createElement('div');
      searchWrap.className = 'search-bar';
      searchWrap.innerHTML = `<input id="emp-search" placeholder="Search by employee ID or name" aria-label="Search employees" />` +
        `<button id="emp-search-btn" aria-label="Search">Search</button>`;
      container.appendChild(searchWrap);

      const suggestions = document.createElement('div');
      suggestions.id = 'suggestions';
      suggestions.className = 'suggestions';
      suggestions.style.display = 'none';
      container.appendChild(suggestions);

      const list = document.createElement('section');
      list.innerHTML = '<h2 style="text-align:center">Employees</h2>' +
        employeesData.map(e=>`<div style="padding:8px 12px; text-align:center"><a class="emp-link" href="employee.html?id=${e.emp_id}">${e.emp_name} — ${e.department}</a></div>`).join('');
      container.appendChild(list);

      const input = document.getElementById('emp-search');
      const btn = document.getElementById('emp-search-btn');
      const suggEl = document.getElementById('suggestions');

      let debounceTimer = null;
      input.addEventListener('input', (ev)=>{
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(()=>{
          updateSuggestions(input.value.trim());
        }, 150);
      });

      input.addEventListener('keydown', (ev)=>{
        if(ev.key === 'Enter'){
          ev.preventDefault();
          performSearch(input.value.trim());
        }
      });

      btn.addEventListener('click', ()=>performSearch(input.value.trim()));

      function updateSuggestions(term){
        if(!term){ suggEl.style.display='none'; return; }
        const q = term.toLowerCase();
        const matches = employeesData.filter(e=> e.emp_id.includes(q) || e.emp_name.toLowerCase().includes(q));
        if(matches.length === 0){ suggEl.style.display='none'; return; }
        suggEl.innerHTML = matches.slice(0,8).map(m=>`<div class="suggestion-item" data-id="${m.emp_id}"><strong>${m.emp_id}</strong> — ${m.emp_name} <span style="color:#6b7280">— ${m.department}</span></div>`).join('');
        suggEl.style.display = 'block';
        // attach click
        Array.from(suggEl.querySelectorAll('.suggestion-item')).forEach(it=>{
          it.addEventListener('click', ()=>{
            const id = it.getAttribute('data-id');
            history.pushState({}, '', `employee.html?id=${id}`);
            handleRouting();
          });
        });
      }

      function performSearch(value){
        if(!value) return;
        // if matches a full id exactly
        const byId = employeesData.find(e=> e.emp_id === value);
        if(byId){ history.pushState({}, '', `employee.html?id=${byId.emp_id}`); handleRouting(); return; }
        // if entered name or partial, try first suggestion
        const q = value.toLowerCase();
        const first = employeesData.find(e=> e.emp_id.includes(q) || e.emp_name.toLowerCase().includes(q));
        if(first){ history.pushState({}, '', `employee.html?id=${first.emp_id}`); handleRouting(); return; }
        // not found
        const container = document.querySelector('.container');
        const msg = document.createElement('div');
        msg.innerHTML = '<p style="color:#b91c1c; text-align:center">No employee found for "' + value + '"</p>';
        container.insertBefore(msg, container.children[2] || null);
        setTimeout(()=>msg.remove(), 3000);
      }
    }

    function renderEmployee(emp){
      const container = document.querySelector('.container');
      container.innerHTML = '';
      const back = document.createElement('div');
      back.innerHTML = '<span class="back-link">← Back to list</span>';
      back.querySelector('.back-link').addEventListener('click', function(){
        history.pushState({}, '', 'employee.html');
        handleRouting();
      });
      container.appendChild(back);

      const article = document.createElement('article');
      article.className = 'employee-card';
      article.innerHTML = `
        <img src="" alt="${emp.emp_name} photo" class="employee-image" id="employee_images" />
        <div class="employee-details">
          <div class="row"><div class="label">ID</div><div class="value" id="emp-id">${emp.emp_id}</div></div>
          <div class="row"><div class="label">Name</div><div class="value" id="emp-name">${emp.emp_name}</div></div>
          <div class="row"><div class="label">Department</div><div class="value" id="emp-dept">${emp.department||'—'}</div></div>
          <div class="row"><div class="label">Blood Group</div><div class="value" id="emp-blood">${emp.blood||'—'}</div></div>
          <p class="muted-note">Tip: Add an image URL in the <code>src</code> attribute for a profile photo.</p>
        </div>`;
      container.appendChild(article);
      document.title = `${emp.emp_name} — Dilshaj Infotech`;
      // Set image src after DOM insertion; transform Google Drive links into direct URLs
      const imgEl = document.getElementById('employee_images');
      function transformDriveUrl(url){
        if(!url) return '';
        try{
          // extract id from either ?id= or /d/ patterns
          const idMatch = url.match(/(?:[?&]id=|\/d\/)([a-zA-Z0-9_-]{10,})/);
          if(idMatch && idMatch[1]){
            return `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
          }
        }catch(e){}
        return url;
      }
      const finalSrc = transformDriveUrl(emp.img_src || '');
      function initials(name){
        if(!name) return '';
        return name.split(' ').filter(Boolean).map(n=>n[0].toUpperCase()).slice(0,2).join('');
      }
      function svgPlaceholder(text){
        const bg1 = '#0b72ff';
        const bg2 = '#ff7a59';
        const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='600' height='120'><defs><linearGradient id='g' x1='0' x2='1'><stop stop-color='${bg1}' offset='0'/><stop stop-color='${bg2}' offset='1'/></linearGradient></defs><rect width='100%' height='100%' fill='url(#g)' rx='8' ry='8'/><text x='50%' y='55%' font-family='Arial, Helvetica, sans-serif' font-size='48' fill='#fff' text-anchor='middle' dominant-baseline='middle'>${text}</text></svg>`;
        return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
      }

      if(finalSrc){
        imgEl.src = finalSrc;
      } else {
        imgEl.src = svgPlaceholder(initials(emp.emp_name));
      }
      imgEl.addEventListener('error', ()=>{
        imgEl.src = svgPlaceholder(initials(emp.emp_name));
      });
    }

    function handleRouting(){
      const id = getIdFromURL();
      if(!id){
        renderWelcome();
        return;
      }
      const emp = employeesData.find(e=>e.emp_id === id);
      if(!emp){
        const container = document.querySelector('.container');
        container.innerHTML = '<p style="color:#b91c1c">Employee not found.</p>';
        return;
      }
      renderEmployee(emp);
    }

    function onContainerClick(e){
      const a = e.target.closest('a.emp-link');
      if(!a) return;
      e.preventDefault();
      const url = new URL(a.href, location.href);
      history.pushState({}, '', url.pathname + url.search + url.hash);
      handleRouting();
    }

    async function init(){
      try{
        const res = await fetch('employees.json');
        if(!res.ok) throw new Error('Failed to load employees.json');
        employeesData = await res.json();
        handleRouting();
        window.addEventListener('popstate', handleRouting);
        document.querySelector('.container').addEventListener('click', onContainerClick);
      }catch(err){
        console.error(err);
        const container = document.querySelector('.container');
        container.innerHTML = '<p style="color:#b91c1c">Error loading employee data.</p>';
      }
    }

    init();
  })();
  </script>
</body>
</html>
